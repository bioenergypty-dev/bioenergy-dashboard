<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioenergy Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            width:350px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            margin-bottom:20px;
        }

        .logo h1{
            color:#16a34a;
            font-size:28px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#16a34a;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#16a34a;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#15803d;
        }

        .error{
            background:#fee2e2;
            color:#dc2626;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
        }

    </style>
</head>
<body>

    <div class="login-container">

        <div class="logo">
            <h1>BIOENERGY</h1>
        </div>

        <p class="subtitle">
            Dashboard Login
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="form-group">
                <input
                    type="text"
                    name="username"
                    placeholder="Usuario"
                    required
                >
            </div>

            <div class="form-group">
                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >
            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</body>
</html>
